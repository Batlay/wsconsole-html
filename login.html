<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>html template</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>

  <nav>
    <a href="index.html">Go to home</a>
  </nav>
  <div class="login-container">
    <div class="login-container__form">
      <img src="./assets/login_logo.png" alt="Butlerapp logo" class="login-logo">
      <div class="login-container__card">
        <div class="login-container__card-header">
          <h2>Welcome to Butlerapp</h2>
          <p>Please log in with your email and password.
          </p>
        </div>
        <div class="login-container__card-form-group">
          <div class="form_control">
            <label class="form_control__label" for="login-email">Email</label>
            <input id="login-email" name="email" class="form_control__input form_control__input--login" type="email"
              autocomplete="email" inputmode="email" placeholder="Email" />
          </div>
          <div class="form_control">
            <label class="form_control__label" for="login-password">Password</label>
            <input id="login-password" name="password" class="form_control__input form_control__input--login"
              type="password" autocomplete="current-password" placeholder="Enter password" />
          </div>
        </div>
        <button id="btn-installation" class="btn btn--contained btn--login" type="button">
          <span class="btn__text">Login</span>
          <div class="btn__overlay"></div>
        </button>
      </div>
    </div>
    <div class="login-container__footer">
      <a href="#">Forgot password?</a>
    </div>
  </div>
</body>

</html>
